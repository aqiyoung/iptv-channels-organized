name: Weekly Channel Sync

on:
  schedule:
    # Asia/Shanghai 每周一 03:00 = UTC 周日 19:00
    - cron: '0 19 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Clone iptv-app (shallow, for source data)
        run: |
          git clone --depth 1 https://github.com/aqiyoung/iptv-app.git /tmp/iptv-app

      - name: Run build script
        run: |
          python3 scripts/build_channels.py /tmp/iptv-app/assets/data --out .

      - name: Commit & push if changed
        run: |
          git config user.name "OpenClaw Bot"
          git config user.email "bot@openclaw.local"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: weekly channel sync $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push origin HEAD:main
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}